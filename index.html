<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmed Love</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotateHeart 15s infinite linear;
        }
        .love-word {
            color: #ea80b0;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            position: absolute;
            left: 50%;
            top: 50%;
            text-shadow: 0 0 10px #ff3377;
            white-space: nowrap;
            opacity: 0;
            animation: fadeInOut 4s infinite ease-in-out;
        }
        @keyframes rotateHeart {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translate3d(var(--x), var(--y), var(--z)) scale(0.8); }
            50% { opacity: 1; transform: translate3d(var(--x), var(--y), var(--z)) scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container" id="heart-container"></div>

    <script>
        const container = document.getElementById('heart-container');
        const wordsCount = 180; 
        const textToDisplay = "I love you"; // You can change this text!

        for (let i = 0; i < wordsCount; i++) {
            const word = document.createElement('div');
            word.className = 'love-word';
            word.innerText = textToDisplay;

            // Math formula to arrange text into a 3D Heart shape
            const t = Math.PI * 2 * (i / wordsCount);
            
            // Heart curve formulas
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            
            // Spherical dispersion to give it a 3D pop effect
            const z = (Math.random() - 0.5) * 50; 

            // Scale up the coordinates for mobile screens
            const scale = 10; 
            const posX = x * scale;
            const posY = y * scale;

            // Assign unique positions using CSS variables
            word.style.setProperty('--x', `${posX}px`);
            word.style.setProperty('--y', `${posY}px`);
            word.style.setProperty('--z', `${z}px`);

            // Stagger the animation so they pulse beautifully
            word.style.animationDelay = `${Math.random() * 4}s`;

            container.appendChild(word);
        }
    </script>
</body>
</html>
