<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmed Love</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotateHeart 12s infinite linear;
        }
        .love-word {
            color: #ea80b0;
            font-size: 0.85rem;
            font-family: Arial, sans-serif;
            position: absolute;
            left: 50%;
            top: 45%;
            text-shadow: 0 0 8px #ff3377, 0 0 15px #ff3377;
            white-space: nowrap;
            opacity: 0;
            animation: fadeInOut 4s infinite ease-in-out;
        }
        /* Visual cue for her to tap the screen */
        .tap-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 10;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes rotateHeart {
            0% { transform: rotateY(0deg) rotateX(5deg); }
            100% { transform: rotateY(360deg) rotateX(5deg); }
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translate3d(var(--x), var(--y), var(--z)) scale(0.8); }
            50% { opacity: 1; transform: translate3d(var(--x), var(--y), var(--z)) scale(1.1); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto" crossorigin="anonymous">
        <source src="https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3" type="audio/mp3">
    </audio>

    <div class="tap-hint" id="hint-text">TAP SCREEN FOR MUSIC 🎵</div>

    <div class="container" id="heart-container"></div>

    <script>
        const container = document.getElementById('heart-container');
        const wordsCount = 220; 
        const textToDisplay = "I love you"; 

        for (let i = 0; i < wordsCount; i++) {
            const word = document.createElement('div');
            word.className = 'love-word';
            word.innerText = textToDisplay;

            const t = Math.PI * 2 * (i / wordsCount);
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            const z = (Math.random() - 0.5) * 30; 

            const scaleX = 7.5; 
            const scaleY = 7.5;
            const posX = x * scaleX;
            const posY = y * scaleY;

            word.style.setProperty('--x', `${posX}px`);
            word.style.setProperty('--y', `${posY}px`);
            word.style.setProperty('--z', `${z}px`);
            word.style.animationDelay = `${Math.random() * 4}s`;

            container.appendChild(word);
        }

        const music = document.getElementById('bg-music');
        const hint = document.getElementById('hint-text');
        
        // This makes sure the sound plays immediately when she touches the screen
        window.addEventListener('click', () => {
            music.play().then(() => {
                hint.style.display = 'none'; // Removes the text once music works
            }).catch(err => {
                console.log("Playback blocked:", err);
            });
        }, { once: true });
        
        window.addEventListener('touchstart', () => {
            music.play().then(() => {
                hint.style.display = 'none';
            }).catch(err => {
                console.log("Playback blocked:", err);
            });
        }, { once: true });
    </script>
</body>
</html>
